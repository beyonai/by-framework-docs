# Redis 注册中心配置
# 对应 RedisClient.getInstance() 加载逻辑

# Redis 主机地址，默认 localhost
gateway.redis.host=localhost

# Redis 端口，默认 6379
gateway.redis.port=6379

# Redis 数据库索引，默认 0
gateway.redis.db=0

# [可选] Redis 用户名 (仅在开启 ACL 时使用)
gateway.redis.username=myuser

# [可选] Redis 密码
gateway.redis.password=mypassword

# ===================================================================
# 服务发现增强配置
# ===================================================================

# [可选] 指定注册到中心的主机名/IP
# SDK 默认会自动探测本机网卡出口 IP。但在 Docker 或 NAT 映射环境下，
# 自动探测的 IP 可能是容器内网 IP (如 172.x.x.x)，导致外部网关无法连接。
# 此时需要手动指定外部可访问的宿主机 IP 或域名。
# gateway.discovery.host=192.168.1.100
